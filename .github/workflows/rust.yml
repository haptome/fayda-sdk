name: Rust

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/rust/**"
      - ".github/workflows/rust.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cd packages/rust && cargo fmt --check

      - name: Clippy lint
        run: cd packages/rust && cargo clippy -- -D warnings

      - name: Run tests
        run: cd packages/rust && cargo test --verbose

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/rust-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('packages/rust/Cargo.lock') }}

      - name: Publish to crates.io
        run: cd packages/rust && cargo publish --token ${{ secrets.CRATES_KEY }}
