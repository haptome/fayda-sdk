name: Node

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/node/**"
      - "packages/react/**"
      - "package.json"
      - ".github/workflows/node.yml"
    tags:
      - "node-v*"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/node/**"
      - "packages/react/**"
      - "package.json"
      - ".github/workflows/node.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install all JS dependencies (workspace)
        run: npm install

      - name: Build
        run: cd packages/node && npm run build

      - name: Test
        run: cd packages/node && npm test

      - name: Build
        run: cd packages/react && npm run build

      - name: Test
        run: cd packages/react && npm test

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/node-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          cd packages/node && npm run build
          cd ../react && npm run build

      - name: Publish to npm
        run: cd packages/node && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Publish to npm
        run: cd packages/react && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
