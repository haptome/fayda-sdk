name: Go

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/go/**"
      - ".github/workflows/go.yml"
    tags:
      - "go/v*"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/go/**"
      - ".github/workflows/go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: packages/go/go.sum

      - name: Download dependencies
        run: cd packages/go && go mod download

      - name: Run tests
        run: cd packages/go && go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/go/coverage.out

  # Go modules are distributed via the Go module proxy (proxy.golang.org).
  # The proxy picks up the module automatically from the public GitHub repo
  # when a tag of the form  go/v<semver>  is pushed — no upload step needed.
  # This job verifies the module is valid before the tag is considered live.
  verify-module:
    needs: test
    if: startsWith(github.ref, 'refs/tags/go/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Verify module
        run: |
          cd packages/go
          go mod verify
          go build ./...
